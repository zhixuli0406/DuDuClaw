# DuDuClaw Evaluator Agent Template (Phase 2 GVU²)
# Role: Independent QA verifier for agent outputs
# Usage: cp -r templates/evaluator/ ~/.duduclaw/agents/<your-evaluator>/

[agent]
name = "evaluator"
display_name = "QA Evaluator"
role = "specialist"
status = "active"
trigger = ""
reports_to = ""  # Set to orchestrator or calling agent
icon = "shield-check"

[model]
preferred = "claude-haiku-4-5"  # Cost-efficient for verification
fallback = "claude-haiku-4-5"
account_pool = ["main"]
api_mode = "cli"

[model.local]
model = ""
backend = "llama_cpp"
context_length = 4096
gpu_layers = -1
prefer_local = true
use_router = true

[container]
timeout_ms = 60000
max_concurrent = 3
readonly_project = true
sandbox_enabled = true   # Evaluator CAN run sandbox tests
network_access = false

[heartbeat]
enabled = false
interval_seconds = 3600
max_concurrent_runs = 1
cron = ""

[budget]
monthly_limit_cents = 500   # Lower budget — verification is lightweight
warn_threshold_percent = 80
hard_stop = false

[permissions]
can_create_agents = false
can_send_cross_agent = true   # Must reply to delegating agent
can_modify_own_skills = false
can_modify_own_soul = false
can_schedule_tasks = false
allowed_channels = []          # No direct channel access — bus only

[evolution]
skill_auto_activate = false
skill_security_scan = true
gvu_enabled = false            # Evaluator doesn't self-evolve
cognitive_memory = false
max_silence_hours = 168.0      # 7 days — evaluator is passive
max_gvu_generations = 0
observation_period_hours = 24.0
skill_token_budget = 500
max_active_skills = 2

[evolution.external_factors]
user_feedback = false
security_events = true
channel_metrics = false
business_context = false
peer_signals = false

[capabilities]
computer_use = false
browser_via_bash = false
allowed_tools = []
denied_tools = []
