# AgentCapabilityRegistry — Static YAML (W18)
# Schema version: 1.0
#
# Required per agent: agent_id, capabilities[], max_concurrent_tasks
# Optional per agent: description, tags[]
#
# Capabilities use snake_case identifiers.
# This file is loaded at startup and supports hot reload.

schema_version: "1.0"

agents:
  # ── Root ──────────────────────────────────────────────────────────────────
  - agent_id: "agnes"
    description: "Root orchestrator — top-level task coordination and delegation"
    capabilities:
      - orchestration
      - task_delegation
      - root_management
      - cross_team_coordination
    max_concurrent_tasks: 10
    tags:
      - root
      - main
      - orchestrator

