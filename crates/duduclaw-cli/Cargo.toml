[package]
name = "duduclaw-cli"
version.workspace = true
edition.workspace = true

[[bin]]
name = "duduclaw"
path = "src/main.rs"

[dependencies]
duduclaw-core = { workspace = true }
duduclaw-agent = { workspace = true }
duduclaw-container = { workspace = true }
duduclaw-security = { workspace = true }
clap = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
duduclaw-gateway = { workspace = true }
bollard = { workspace = true }
duduclaw-memory = { workspace = true }
reqwest = { version = "0.12", features = ["json"] }
chrono = { workspace = true }
uuid = { workspace = true }
toml = { workspace = true }
urlencoding = "2"
dialoguer = { version = "0.11", features = ["password"] }
console = "0.15"
dirs = "6"
base64 = { workspace = true }
