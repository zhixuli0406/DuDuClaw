# Vendored model registry seed — 2026-07 public list prices.
#
# Prices are stored as INTEGER millicents per million tokens (MTok):
#   $1.00/MTok = 100 cents = 100_000 millicents → input_mc = 100000
# A cache rate of 0 means "not separately priced" — cost math falls back to
# the input rate for those tokens (see ModelRegistry::cost_millicents).
#
# Operators can override / extend this table via ~/.duduclaw/models.toml
# (same schema, merged by ModelRegistry::load_override; later entries win).

# ── Anthropic ────────────────────────────────────────────────────

[[models]]
id = "claude-fable-5"
provider = "anthropic"
context_window = 1000000
max_output_tokens = 128000
input_mc = 1000000       # $10 / MTok
output_mc = 5000000      # $50 / MTok
cache_read_mc = 100000   # $1 / MTok
cache_write_mc = 1250000 # $12.50 / MTok
caps = { tools = true, vision = true, caching = true, reasoning = true, structured = true }

