[package]
name = "duduclaw-gateway"
version.workspace = true
edition.workspace = true

[dependencies]
duduclaw-core = { workspace = true }
duduclaw-agent = { workspace = true }
duduclaw-memory = { workspace = true }
duduclaw-security = { workspace = true }
duduclaw-container = { workspace = true }
chrono = { workspace = true }
cron = { workspace = true }
axum = { workspace = true }
tokio = { workspace = true }
tokio-tungstenite = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
toml = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
uuid = { workspace = true }
reqwest = { version = "0.12", features = ["json"] }
rusqlite = { workspace = true }
hmac = "0.12"
sha2 = "0.10"
base64 = { workspace = true }
ring = { workspace = true }
futures-util = { workspace = true }
duduclaw-dashboard = { workspace = true, optional = true }

[features]
default = ["dashboard"]
dashboard = ["dep:duduclaw-dashboard"]
