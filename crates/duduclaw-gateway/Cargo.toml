[package]
name = "duduclaw-gateway"
version.workspace = true
edition.workspace = true

[dependencies]
duduclaw-core = { workspace = true }
duduclaw-agent = { workspace = true }
duduclaw-memory = { workspace = true }
duduclaw-security = { workspace = true }
duduclaw-container = { workspace = true }
duduclaw-odoo = { workspace = true }
chrono = { workspace = true }
cron = { workspace = true }
axum = { workspace = true }
tokio = { workspace = true }
tokio-tungstenite = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
toml = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
uuid = { workspace = true }
reqwest = { version = "0.12", features = ["json"] }
rusqlite = { workspace = true }
hmac = "0.12"
sha2 = "0.10"
base64 = { workspace = true }
ring = { workspace = true }
futures-util = { workspace = true }
tempfile = "3"
zeroize = "1"
unicode-normalization = "0.1"

[target.'cfg(unix)'.dependencies]
libc = "0.2"
duduclaw-dashboard = { workspace = true, optional = true }

duduclaw-inference = { workspace = true }

[features]
default = ["dashboard"]
dashboard = ["dep:duduclaw-dashboard"]
metal = ["duduclaw-inference/metal"]
cuda = ["duduclaw-inference/cuda"]
vulkan = ["duduclaw-inference/vulkan"]
mistralrs-metal = ["duduclaw-inference/mistralrs-metal"]
mistralrs-cuda = ["duduclaw-inference/mistralrs-cuda"]

[dev-dependencies]
hex = "0.4.3"
