[meta]
name = "Financial"
description = "Payment-card and banking identifiers (card number, IBAN, SWIFT)."
version = "1.0.0"

[rules.credit_card]
type = "regex"
pattern = '''\b\d{4}[\s-]?\d{4}[\s-]?\d{4}[\s-]?\d{4}\b'''
category = "CREDIT_CARD"
priority = 95
restore_scope = { kind = "any_scope", scope = "FinanceRead" }

[rules.iban]
type = "regex"
pattern = '''\b[A-Z]{2}\d{2}[A-Z0-9]{4,30}\b'''
category = "IBAN"
priority = 90
restore_scope = { kind = "any_scope", scope = "FinanceRead" }

[rules.swift_bic]
type = "regex"
pattern = '''\b[A-Z]{4}[A-Z]{2}[A-Z0-9]{2}(?:[A-Z0-9]{3})?\b'''
category = "SWIFT_BIC"
priority = 80
restore_scope = { kind = "any_scope", scope = "FinanceRead" }
