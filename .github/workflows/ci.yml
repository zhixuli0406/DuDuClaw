name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build core crates
        run: cargo build --workspace --exclude duduclaw-bridge --exclude duduclaw-dashboard --exclude duduclaw-gateway
      - name: Build gateway (no dashboard)
        run: cargo build -p duduclaw-gateway --no-default-features
      - name: Test
        run: cargo test --workspace --exclude duduclaw-bridge --exclude duduclaw-dashboard --exclude duduclaw-gateway
      - name: Test gateway
        run: cargo test -p duduclaw-gateway --no-default-features
      - name: Clippy
        run: cargo clippy --workspace --exclude duduclaw-bridge --exclude duduclaw-dashboard --exclude duduclaw-gateway -- -D warnings
      - name: Clippy gateway
        run: cargo clippy -p duduclaw-gateway --no-default-features -- -D warnings

  dashboard:
    name: Dashboard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install frontend dependencies
        run: cd web && npm ci --legacy-peer-deps
      - name: TypeScript check
        run: cd web && npx tsc --noEmit
      - name: Build frontend
        run: cd web && npm run build
      - name: Build dashboard crate
        run: cargo build -p duduclaw-dashboard -p duduclaw-gateway

  python:
    name: Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dev dependencies
        run: pip install pytest pytest-asyncio ruff
      - name: Lint
        run: ruff check python/
      - name: Test
        run: |
          if [ -n "$(find tests/python -name 'test_*.py' 2>/dev/null)" ]; then
            pytest tests/python/ -v
          else
            echo "No Python tests found, skipping"
          fi
