name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build (exclude bridge)
        run: cargo build --workspace --exclude duduclaw-bridge
      - name: Test (exclude bridge)
        run: cargo test --workspace --exclude duduclaw-bridge
      - name: Clippy
        run: cargo clippy --workspace --exclude duduclaw-bridge -- -D warnings

  python:
    name: Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dev dependencies
        run: pip install pytest pytest-asyncio ruff
      - name: Lint
        run: ruff check python/
      - name: Test
        run: pytest tests/python/ -v
        continue-on-error: true
