name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: dtolnay/rust-toolchain@stable
        # NOTE: dtolnay/rust-toolchain is maintained by a trusted Rust community
        # member and does not follow SHA-pinning conventions upstream. Pinning
        # by tag is accepted here as a documented trust decision.
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae  # v2
      - name: Build core crates (no dashboard)
        run: cargo build --workspace --exclude duduclaw-bridge --exclude duduclaw-dashboard --exclude duduclaw-gateway
      - name: Build gateway (no dashboard)
        run: cargo build -p duduclaw-gateway --no-default-features
      - name: Test (no dashboard)
        run: cargo test --workspace --exclude duduclaw-bridge --exclude duduclaw-dashboard --exclude duduclaw-gateway
      - name: Test gateway
        run: cargo test -p duduclaw-gateway --no-default-features
      - name: Clippy (no dashboard)
        run: cargo clippy --workspace --exclude duduclaw-bridge --exclude duduclaw-dashboard --exclude duduclaw-gateway -- -D warnings
      - name: Clippy gateway
        run: cargo clippy -p duduclaw-gateway --no-default-features -- -D warnings

  dashboard:
    name: Dashboard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af  # v4.1.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
        # NOTE: dtolnay/rust-toolchain is maintained by a trusted Rust community
        # member and does not follow SHA-pinning conventions upstream. Pinning
        # by tag is accepted here as a documented trust decision.
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae  # v2
      - name: Install frontend dependencies
        run: cd web && npm ci --legacy-peer-deps
      - name: TypeScript check
        run: cd web && npx tsc --noEmit
      - name: Unit tests
        run: cd web && npm test
      - name: Build frontend
        run: cd web && npm run build
      - name: Build dashboard crate
        run: cargo build -p duduclaw-dashboard -p duduclaw-gateway --features duduclaw-gateway/dashboard -p duduclaw-cli --features duduclaw-cli/dashboard

  python:
    name: Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: "3.12"
      - name: Install dev dependencies
        run: pip install pytest==8.3.4 pytest-asyncio==0.24.0 ruff==0.8.6
      - name: Lint
        run: ruff check python/
      - name: Test
        run: |
          if [ -n "$(find tests/python -name 'test_*.py' 2>/dev/null)" ]; then
            pytest tests/python/ -v
          else
            echo "No Python tests found, skipping"
          fi

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Run cargo audit
        run: |
          cargo audit \
            --ignore RUSTSEC-2023-0071 \
            --ignore RUSTSEC-2024-0388 \
            --ignore RUSTSEC-2024-0436 \
            --ignore RUSTSEC-2025-0057 \
            --ignore RUSTSEC-2025-0119 \
            --ignore RUSTSEC-2025-0134 \
            --ignore RUSTSEC-2026-0049 \
            --ignore RUSTSEC-2026-0097
