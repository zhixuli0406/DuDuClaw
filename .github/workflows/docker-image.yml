name: Docker image

# Build + push the official multi-arch DuDuClaw server image to GHCR.
#
# Runs ONLY on a release tag (`v*`) or a manual dispatch — adding this workflow
# does not publish anything on its own (releasing stays a human gate). The image
# is what the console `docker-compose` distribution pack pulls
# (`ghcr.io/zhixuli0406/duduclaw:<tag>` + `:latest`).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to publish (e.g. v1.35.0)"
        required: true

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/zhixuli0406/duduclaw

jobs:
  build-push:
    name: Build and push (amd64 + arm64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image tag
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: container/Dockerfile.server
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ steps.meta.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
