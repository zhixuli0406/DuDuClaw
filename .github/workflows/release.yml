name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: duduclaw-darwin-arm64
          - target: x86_64-apple-darwin
            os: macos-13
            artifact: duduclaw-darwin-x64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: duduclaw-linux-x64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: duduclaw-linux-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: duduclaw-windows-x64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (aarch64-linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cargo install cross --locked

      - name: Build frontend
        run: cd web && npm ci --legacy-peer-deps && npm run build

      - name: Build binary (cross-compile)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cross build --release --target ${{ matrix.target }} -p duduclaw-cli -p duduclaw-gateway --features duduclaw-gateway/dashboard,duduclaw-cli/dashboard
        env:
          PKG_CONFIG_ALLOW_CROSS: 1

      - name: Build binary
        if: matrix.target != 'aarch64-unknown-linux-gnu'
        run: cargo build --release --target ${{ matrix.target }} -p duduclaw-cli -p duduclaw-gateway --features duduclaw-gateway/dashboard,duduclaw-cli/dashboard

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p _pkg
          cp target/${{ matrix.target }}/release/duduclaw _pkg/
          cp -r python _pkg/python
          cd _pkg
          tar czf ../${{ matrix.artifact }}.tar.gz duduclaw python
          cd ..
          shasum -a 256 ${{ matrix.artifact }}.tar.gz > ${{ matrix.artifact }}.tar.gz.sha256
          rm -rf _pkg

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          New-Item -ItemType Directory -Force -Path _pkg
          Copy-Item target/${{ matrix.target }}/release/duduclaw.exe _pkg/
          Copy-Item -Recurse python _pkg/python
          cd _pkg
          7z a ../${{ matrix.artifact }}.zip duduclaw.exe python
          cd ..
          Get-FileHash ${{ matrix.artifact }}.zip -Algorithm SHA256 | Format-List Hash > ${{ matrix.artifact }}.zip.sha256
          Remove-Item -Recurse -Force _pkg

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            duduclaw-*.tar.gz
            duduclaw-*.zip
            duduclaw-*.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            duduclaw-*.tar.gz
            duduclaw-*.zip
            duduclaw-*.sha256

  # Trigger Pro repo rebuild after CE release
  trigger-pro-rebuild:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch to duduclaw-pro
        if: env.HAS_TOKEN == 'true'
        env:
          HAS_TOKEN: ${{ secrets.PRO_REPO_DISPATCH_TOKEN != '' }}
          PRO_TOKEN: ${{ secrets.PRO_REPO_DISPATCH_TOKEN }}
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $PRO_TOKEN" \
            https://api.github.com/repos/zhixuli0406/duduclaw-pro/dispatches \
            -d '{"event_type":"ce-release","client_payload":{"ce_version":"${{ github.ref_name }}"}}'
